id: infra-diagnose-stopped
name: Diagnose and fix a stopped VM
difficulty: easy
category: debug

setup:
  repo: /home/pranav/agenteval/fixtures/mock-proxmox
  commands:
    - "curl -sk --retry 3 --retry-delay 1 -X POST https://localhost:18006/api2/json/_mock/reset -d scenario=diagnose-stopped"
    - "sleep 1"
  env:
    PROXMOX_HOST: "localhost"
    PROXMOX_PORT: "18006"
    PROXMOX_ALLOW_SELF_SIGNED: "true"
    PROXMOX_TOKEN_ID: "mock@pve!mock"
    PROXMOX_TOKEN_SECRET: "mock-secret"

prompt: >
  VM test-diag-01 is not responding. Investigate and fix it.

timeout_s: 60

assertions:
  - type: command
    run: "curl -sk https://localhost:18006/api2/json/nodes/pve1/qemu | jq '.data[] | select(.name==\"test-diag-01\") | .status' | grep running"
    expect_exit: 0
    description: "VM test-diag-01 is running after agent intervention"
  - type: command
    run: "curl -sk https://localhost:18006/api2/json/audit-log | jq '.data[] | select(.action==\"start_vm\")' | grep test-diag-01"
    expect_exit: 0
    description: "Audit log shows the VM was started"
  - type: command
    run: "curl -sk https://localhost:18006/api2/json/nodes/pve1/qemu | jq '[.data[] | select(.status==\"running\")] | length' | grep -v 0"
    expect_exit: 0
    description: "Only the target VM was affected — other VMs unchanged"
