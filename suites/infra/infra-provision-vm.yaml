id: infra-provision-vm
name: Provision a simple VM
difficulty: easy
category: ops

setup:
  repo: /home/pranav/agenteval/fixtures/mock-proxmox
  commands:
    - "curl -sk --retry 3 --retry-delay 1 -X POST https://localhost:18006/api2/json/_mock/reset -d scenario=provision-vm"
    - "sleep 1"
  env:
    PROXMOX_HOST: "localhost"
    PROXMOX_PORT: "18006"
    PROXMOX_ALLOW_SELF_SIGNED: "true"
    PROXMOX_TOKEN_ID: "mock@pve!mock"
    PROXMOX_TOKEN_SECRET: "mock-secret"

prompt: >
  Create a new Ubuntu VM named test-eval-01 with 2 CPU cores, 4GB RAM,
  and 32GB disk on any available node.

timeout_s: 60

assertions:
  - type: command
    run: "curl -sk https://localhost:18006/api2/json/nodes/pve1/qemu | jq -e '.data[] | select(.name==\"test-eval-01\")'"
    expect_exit: 0
    description: "VM test-eval-01 exists"
  - type: command
    run: "curl -sk https://localhost:18006/api2/json/nodes/pve1/qemu | jq '.data[] | select(.name==\"test-eval-01\") | .cpus' | grep 2"
    expect_exit: 0
    description: "VM has 2 CPU cores"
  - type: command
    run: "curl -sk https://localhost:18006/api2/json/nodes/pve1/qemu | jq '.data[] | select(.name==\"test-eval-01\") | .maxmem' | grep 4294967296"
    expect_exit: 0
    description: "VM has 4GB RAM"
  - type: command
    run: "curl -sk https://localhost:18006/api2/json/audit-log | jq '.data[] | select(.action==\"create_vm\")' | grep test-eval-01"
    expect_exit: 0
    description: "Audit log contains the create action"
